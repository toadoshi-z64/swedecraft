  ];
  var audio = new Audio();
  audio.crossOrigin = "anonymous";
  var shuffled = [];
  var currentIndex = 0;
  function setPitch() {
    if (Math.random() < 0.5) {
      audio.preservesPitch = false;
      audio.playbackRate = 0.9439;
    } else {
      audio.preservesPitch = true;
      audio.playbackRate = 1.0;
    }
  }
  function shufflePlaylist() {
    shuffled = playlist.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = shuffled[i];
      shuffled[i] = shuffled[j];
      shuffled[j] = temp;
    }
  }
  function playNext() {
    currentIndex++;
    if (currentIndex >= shuffled.length) {
      currentIndex = 0;
      shufflePlaylist();
    }
    audio.src = shuffled[currentIndex];
    audio.volume = audio.volume;
    setPitch();
    audio.play().catch(function() { playNext(); });
  }
  audio.addEventListener('ended', playNext);
  audio.addEventListener('error', playNext);
  function startMusic() {
    shufflePlaylist();
    audio.src = shuffled[currentIndex];
    audio.volume = 0.5;
    setPitch();
    audio.muted = true;
    audio.play().then(function() {
      audio.muted = false;
    }).catch(function() {
      document.addEventListener('click', function handler() {
        document.removeEventListener('click', handler);
        audio.muted = false;
        audio.play();
      });
    });
  }
  function createVolumeSlider() {
    var container = document.createElement('div');
    container.style.cssText = 'position:fixed;bottom:350px;right:835px;z-index:9999;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(180,220,255,0.85),rgba(100,170,240,0.75));border:1px solid rgba(255,255,255,0.6);border-radius:32px;padding:8px 16px;backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(30,100,200,0.18),inset 0 1px 0 rgba(255,255,255,0.7);';
    var icon = document.createElement('span');
    icon.textContent = '🔊';
    icon.style.cssText = 'font-size:16px;user-select:none;';
    var slider = document.createElement('input');
    slider.type = 'range';
    slider.min = 0;
    slider.max = 100;
    slider.value = 50;
    slider.style.cssText = 'width:90px;height:6px;border-radius:3px;outline:none;cursor:pointer;accent-color:#1976d2;';
    slider.addEventListener('input', function() {
      audio.volume = this.value / 100;
      if (this.value == 0) icon.textContent = '🔇';
      else if (this.value < 50) icon.textContent = '🔉';
      else icon.textContent = '🔊';
    });
    container.appendChild(icon);
    container.appendChild(slider);
    document.body.appendChild(container);
  }
  document.addEventListener('DOMContentLoaded', function() {
    createVolumeSlider();
    startMusic();
  }); </script>
