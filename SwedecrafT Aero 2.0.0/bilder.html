    <script> var playlist = [
    "https://drive.google.com/uc?export=download&id=1V11sQ8_Kelt3p7Lc_uK9qVvTI-PugiSF",
    "https://drive.google.com/uc?export=download&id=1xXMz_yMt1F0HYpCNNtAKL2M9JOYsE7el"
  ];
  var current = 0;
  var audio = new Audio();
  var started = false;
  function playSong(index) {
    audio.src = playlist[index];
    audio.volume = 0.5;
    audio.play();
    audio.onended = function() {
      current = (current + 1) % playlist.length;
      playSong(current);
    };
  }
  function startPlaylist() {
    if (started) return;
    started = true;
    document.removeEventListener('click', startPlaylist);
    playSong(current);
  }
  document.addEventListener('DOMContentLoaded', function() {
    document.addEventListener('click', startPlaylist);
  }); </script>
