    <script> window.onload = function () {
  var servers = [
    { id: "status-survival", ip: "waking-trophy.gl.joinmc.link" },
    { id: "status-modded",   ip: "else-que.gl.joinmc.link"               },
    { id: "status-open",     ip: "scraft.minecraft.party"                  }
  ];
  function fetchStatus(server) {
    var el = document.getElementById(server.id);
    if (!el) return;
    fetch("https://api.mcstatus.io/v2/status/java/" + server.ip)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.online) {
          var online = (data.players && data.players.online) || 0;
          var max    = (data.players && data.players.max)    || "?";
          el.innerHTML = "🟢 " + online + "/" + max;
          el.style.color = "#4caf50";
        } else {
          el.innerHTML = "🔴 Offline";
          el.style.color = "#f44336";
        }
      })
      .catch(function() {
        el.innerHTML = "⚠️ Fel";
      });
  }
  servers.forEach(fetchStatus);
  setInterval(function() { servers.forEach(fetchStatus); }, 60000);
}; </script>
